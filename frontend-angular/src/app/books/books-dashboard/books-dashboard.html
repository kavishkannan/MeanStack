<div class="app-toolbar">

    <div style="flex:1; display:flex; align-items:center; gap:12px;">
        <button mat-flat-button color="primary" (click)="openCreate()">Add Book</button>

        <mat-form-field appearance="fill" style="max-width:520px; width:100%;">
            <mat-label>Search (Title / Author / ISBN)</mat-label>
            <input matInput placeholder="Search" [(ngModel)]="search" (keyup.enter)="applySearch()" />
            <button mat-icon-button matSuffix (click)="applySearch()" aria-label="Search">
                <span class="material-icons">search</span>
            </button>
        </mat-form-field>
    </div>
</div>

<div class="table-card" style="margin:18px;">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2" matSort>

        <!-- Title -->
        <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
            <td mat-cell *matCellDef="let row">{{row.title}}</td>
        </ng-container>

        <!-- Author -->
        <ng-container matColumnDef="author_name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Author</th>
            <td mat-cell *matCellDef="let row">{{row.author_name}}</td>
        </ng-container>

        <!-- Category -->
        <ng-container matColumnDef="category_name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
            <td mat-cell *matCellDef="let row">{{row.category_name}}</td>
        </ng-container>

        <!-- Year -->
        <ng-container matColumnDef="published_year">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Year</th>
            <td mat-cell *matCellDef="let row">{{row.published_year}}</td>
        </ng-container>

        <!-- Price -->
        <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
            <td mat-cell *matCellDef="let row">{{row.price | currency}}</td>
        </ng-container>

        <!-- Copies -->
        <ng-container matColumnDef="copies">
            <th mat-header-cell *matHeaderCellDef>Copies</th>
            <td mat-cell *matCellDef="let row">{{row.copies}}</td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row">
                <button mat-icon-button color="primary" (click)="openEdit(row)" matTooltip="Edit">
                    <span class="material-icons">edit</span>
                </button>
                <button mat-icon-button color="warn" (click)="delete(row)" matTooltip="Delete">
                    <span class="material-icons">delete</span>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="total" [pageSize]="pageSize" (page)="onPageChange($event)"></mat-paginator>
</div>
